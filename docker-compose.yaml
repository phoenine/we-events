services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Shanghai
      APP_NAME: we-events
      SERVER_NAME: we-events
      WEB_NAME: we-events
      SECRET_KEY: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      THREADS: ${THREADS:-1}
      PORT: 38001
      USERNAME: ${USERNAME:-admin@example.com}
      PASSWORD: ${PASSWORD:-admin@123}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CACHE_DIR: ${CACHE_DIR:-./data/cache}
      ARTICLE_COLLECTION_WORKER_ENABLED: ${ARTICLE_COLLECTION_WORKER_ENABLED:-true}
      GROUP_COLLECTION_SCHEDULER_ENABLED: ${GROUP_COLLECTION_SCHEDULER_ENABLED:-true}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: 120
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_API_BASE: ${OCR_API_BASE:-}
      OCR_MODEL: ${OCR_MODEL:-}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_REQUEST_TIMEOUT_SECONDS: ${OCR_REQUEST_TIMEOUT_SECONDS:-60}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_QR_BUCKET: ${SUPABASE_QR_BUCKET:-qr}
      SUPABASE_ARTICLES_BUCKET: ${SUPABASE_ARTICLES_BUCKET:-article-images}
      SUPABASE_QR_PATH: ${SUPABASE_QR_PATH:-wx/{uuid}.png}
      SUPABASE_ARTICLE_IMAGE_PATH: ${SUPABASE_ARTICLE_IMAGE_PATH:-articles/{article_id}/{filename}}
      SUPABASE_QR_SIGN_EXPIRES: ${SUPABASE_QR_SIGN_EXPIRES:-120}
    ports:
      - "38001:38001"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38001/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "30000:30000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    # external: true
    name: we-events-network
