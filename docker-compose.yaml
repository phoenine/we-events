services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      SUPABASE_URL: https://ljzbrkbgfifkporwgesc.supabase.co
      TZ: Asia/Shanghai
      APP_NAME: we-events
      SERVER_NAME: we-events
      WEB_NAME: we-events
      SECRET_KEY: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      USERNAME: ${USERNAME:-admin@phoenine.top}
      PASSWORD: ${PASSWORD:-WxHelper@2025!}
      THREADS: ${THREADS:-1}
      PORT: 38001
      DEBUG: ${DEBUG:-false}
      LLM_TIMEOUT_SECONDS: 120
    ports:
      - "38001:38001"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38001/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "30000:30000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    # external: true
    name: ws-supabase_default
