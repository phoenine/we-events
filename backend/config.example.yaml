app_name: ${APP_NAME:-we-events}
server:
  #服务名称
  name: ${SERVER_NAME:-we-events}
  #前端显示名称
  web_name: ${WEB_NAME:-we-events}
  #代码修改自动重启服务，默认为False
  auto_reload: ${AUTO_RELOAD:-False}
  #最大线程数 默认2个线程，不建议超过4个线程
  threads: ${THREADS:-4}
user_agent: ${USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36}

#文章采集时每篇文章抓取间隔时间，单位秒
interval: ${SPAN_INTERVAL:- 10}

#API服务端口
port: ${PORT:-8001}
#调试模式
debug: ${DEBUG:-False}

#最大页数 第一次添加 采集的页数默认5页
max_page: ${MAX_PAGE:-5}

#手动触发单个公众号更新的最小时间间隔（秒）
sync_interval: ${SYNC_INTERVAL:-60}

#登录会话有效时长 单位分钟 默认4320分钟 3天
token_expire_minutes: ${TOKEN_EXPIRE_MINUTES:-4320}

cache:
  #缓存目录，默认为./data/cache
  dir: ${CACHE_DIR:-./data/cache}

article:
  #是否真实删除文章，默认False，如果为True，则会删除数据库中的记录
  true_delete: ${ARTICLE_TRUE_DELETE:-False}

gather:
  #是否采集内容  默认True
  content: ${GATHER_CONTENT:-True}
  #采集模式，web模式（可采集到发布链接)，api模式（可采集临时链接），app模式（采集最新消息）
  model: ${GATHER_MODEL:-app}
#安全配置
safe:
  # 需要隐藏的配置信息，用逗号分隔
  hide_config: "${SAFE_HIDE_CONFIG:-token}"
  # 授权加密KEY
  lic_key: "${SAFE_LIC_KEY:-PHOENINE-SECURE-LIC-KEY-1234567890}"
log:
  #日志文件路径，默认写入 ./data/logs/we-events.log，可通过 LOG_FILE 覆盖
  file: ${LOG_FILE:-./data/logs/we-events.log}
  #日志级别，默认为INFO，可选DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: ${LOG_LEVEL:-INFO}
